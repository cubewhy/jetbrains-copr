name: Scheduled Update Check

on:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
      COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
      COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      JETBRAINS_COPR_JOBS: ${{ vars.JETBRAINS_COPR_JOBS }}
      UV_LINK_MODE: copy
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install system RPM tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install COPR CLI
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv tool install --python 3.12 "copr-cli==2.4"

      - name: Install Python dependencies
        run: uv sync --dev --locked

      - name: Run test suite
        run: uv run pytest

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and publish
        id: automation
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          uv run jetbrains-copr build \
            --config config/products.json \
            --state state/versions.json \
            --output-dir dist \
            --root-dir work \
            --jobs "${JETBRAINS_COPR_JOBS:-1}" \
            --cleanup-after-product \
            --sync-state-to-git \
            --publish-release \
            --publish-copr

      - name: Fail job if automation failed
        if: steps.automation.outcome == 'failure'
        run: exit 1
