name: Manual Build

on:
  workflow_dispatch:
    inputs:
      product:
        description: "Optional product code or rpm_name filter"
        required: false
        type: string
      architectures:
        description: "Optional comma-separated architectures, for example x86_64,aarch64"
        required: false
        type: string
      publish_release:
        description: "Publish GitHub Releases"
        required: true
        default: false
        type: boolean
      publish_copr:
        description: "Submit SRPM to COPR"
        required: true
        default: false
        type: boolean
      dry_run:
        description: "Resolve updates and render specs without building or publishing"
        required: true
        default: true
        type: boolean
      force:
        description: "Force rebuild even if state already matches upstream"
        required: true
        default: false
        type: boolean
      jobs:
        description: "Parallel build workers. Use 1 on GitHub-hosted runners unless you have validated disk headroom."
        required: true
        default: "1"
        type: string

permissions:
  contents: write

jobs:
  manual-build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
      COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
      COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      UV_LINK_MODE: copy
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install system RPM tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install COPR CLI
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv tool install --python 3.12 "copr-cli==2.4"

      - name: Install Python dependencies
        run: uv sync --dev --locked

      - name: Run test suite
        run: uv run pytest

      - name: Run requested build
        id: automation
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          args=(
            build
            --config config/products.json
            --state state/versions.json
            --output-dir dist
            --root-dir work
            --jobs "${{ inputs.jobs }}"
            --cleanup-after-product
          )

          if [[ "${{ inputs.publish_release }}" == "true" ]]; then
            args+=(--publish-release)
          fi

          if [[ "${{ inputs.publish_copr }}" == "true" ]]; then
            args+=(--publish-copr)
          fi

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi

          if [[ "${{ inputs.force }}" == "true" ]]; then
            args+=(--force)
          fi

          if [[ -n "${{ inputs.product }}" ]]; then
            args+=(--product "${{ inputs.product }}")
          fi

          if [[ -n "${{ inputs.architectures }}" ]]; then
            IFS=',' read -r -a arch_list <<< "${{ inputs.architectures }}"
            for arch in "${arch_list[@]}"; do
              arch="$(echo "$arch" | xargs)"
              if [[ -n "$arch" ]]; then
                args+=(--arch "$arch")
              fi
            done
          fi

          uv run jetbrains-copr "${args[@]}"

      - name: Commit state updates
        if: always()
        continue-on-error: true
        run: |
          if git diff --quiet -- state/versions.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/versions.json
          git commit -m "Update JetBrains release state"
          git push

      - name: Fail job if automation failed
        if: steps.automation.outcome == 'failure'
        run: exit 1
